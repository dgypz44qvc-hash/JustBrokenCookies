<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JBC Local Editor</title>
  <link rel="stylesheet" href="/css/local-editor.css">
</head>
<body>
  <div id="editor-shell">
    <header id="topbar" aria-label="Editor toolbar">
      <div class="brand" aria-label="JBC Local Editor">JBC</div>
      <nav class="tool-group page-tools" aria-label="Page">
        <select id="page-select" title="Page" aria-label="Page">
          <option value="index.html">Home</option>
        </select>
      </nav>
      <nav class="tool-group" aria-label="Panels">
        <button id="btn-layers" type="button" class="icon-btn" title="Layers" aria-label="Layers">Layers</button>
        <button id="btn-properties" type="button" class="icon-btn" title="Properties" aria-label="Properties">Properties</button>
        <button id="btn-clean-canvas" type="button" class="icon-btn" title="Clean Canvas" aria-label="Clean Canvas">Clean</button>
      </nav>
      <nav class="tool-group view-tools" aria-label="View">
        <button id="btn-desktop-view" type="button" class="icon-btn active" title="Desktop view" aria-label="Desktop view">Desktop</button>
        <button id="btn-mobile-view" type="button" class="icon-btn" title="Mobile view" aria-label="Mobile view">Mobile</button>
        <button id="btn-zoom-out" type="button" class="icon-btn" title="Zoom out" aria-label="Zoom out">-</button>
        <span id="zoom-label" aria-live="polite">100%</span>
        <button id="btn-zoom-in" type="button" class="icon-btn" title="Zoom in" aria-label="Zoom in">+</button>
      </nav>
      <nav class="tool-group" aria-label="Editing">
        <button id="btn-preview" type="button" class="icon-btn" title="Preview" aria-label="Preview">Preview</button>
        <button id="btn-undo" type="button" class="icon-btn" title="Undo" aria-label="Undo">Undo</button>
        <button id="btn-redo" type="button" class="icon-btn" title="Redo" aria-label="Redo">Redo</button>
      </nav>
      <span id="status">Loading...</span>
      <button id="btn-save" type="button" class="save" title="Save">Save</button>
    </header>

    <aside id="left-panel" class="panel panel-left" aria-label="Layers and images">
      <div class="panel-head">
        <h2>Layers</h2>
        <button id="btn-close-layers" type="button" class="ghost-btn" title="Collapse layers">Hide</button>
      </div>
      <div id="layers" class="layers-tree"></div>

      <div class="panel-head image-head">
        <h2>Images</h2>
        <button id="btn-refresh-images" type="button" class="ghost-btn">Refresh</button>
      </div>
      <div id="image-list" class="image-list"></div>
    </aside>

    <div id="left-gutter" class="panel-gutter panel-gutter-left" aria-label="Resize layers panel">
      <button id="btn-collapse-left" type="button" title="Collapse layers" aria-label="Collapse layers">‹</button>
    </div>

    <main id="canvas-wrap">
      <iframe id="site-frame" title="Website canvas"></iframe>
    </main>

    <div id="right-gutter" class="panel-gutter panel-gutter-right" aria-label="Resize properties panel">
      <button id="btn-collapse-right" type="button" title="Collapse properties" aria-label="Collapse properties">›</button>
    </div>

    <aside id="right-panel" class="panel panel-right" aria-label="Properties">
      <div class="panel-head">
        <h2>Properties</h2>
        <button id="btn-close-properties" type="button" class="ghost-btn" title="Collapse properties">Hide</button>
      </div>

      <section class="selected-card">
        <div class="eyebrow">Selected</div>
        <div id="selected-name">Nothing selected</div>
        <div id="selected-meta"></div>
      </section>

      <section class="property-section text-tools">
        <h3>Text</h3>
        <textarea id="prop-text" rows="4" aria-label="Selected text"></textarea>
      </section>

      <section class="property-section asset-tools">
        <h3>Upload</h3>
        <label>File type
          <select id="upload-kind">
            <option value="auto">Auto detect</option>
            <option value="image">Image</option>
            <option value="vector">SVG / Vector</option>
            <option value="decoration">Decoration</option>
          </select>
        </label>
        <label>Upload as
          <select id="upload-target">
            <option value="screen">Add to screen top layer</option>
            <option value="section-bg">Add as section background</option>
            <option value="page-bg">Add as page background</option>
          </select>
        </label>
        <div class="inline-actions">
          <button id="btn-upload-asset" type="button">Choose File</button>
          <button id="btn-add-section-panel" type="button">New Section</button>
        </div>
      </section>

      <section class="property-section image-tools">
        <h3>Image</h3>
        <label>Source <input id="prop-src" type="text"></label>
        <input id="upload-image" type="file" accept=".png,.jpg,.jpeg,.webp,.gif,.svg,image/png,image/jpeg,image/webp,image/gif,image/svg+xml">
        <button id="btn-apply-src" type="button">Apply Source</button>
      </section>

      <section class="property-section">
        <h3>Position</h3>
        <div class="field-grid">
          <label>Left <input id="prop-left" type="text"></label>
          <label>Top <input id="prop-top" type="text"></label>
          <label>Width <input id="prop-width" type="text"></label>
          <label>Height <input id="prop-height" type="text"></label>
          <label>Z-index <input id="prop-z" type="number" step="1"></label>
          <label>Rotate <input id="prop-rotate" type="text"></label>
        </div>
      </section>

      <section class="property-section">
        <h3>Style</h3>
        <div class="field-grid">
          <label>Opacity <input id="prop-opacity" type="number" step="0.05" min="0" max="1"></label>
          <label>Radius <input id="prop-radius" type="text"></label>
          <label>Text <input id="prop-color" type="color"></label>
          <label>Fill <input id="prop-bg" type="color"></label>
          <label>Font size <input id="prop-font-size" type="text"></label>
          <label>Spacing <input id="prop-letter" type="text"></label>
        </div>
        <label>Font family <input id="prop-font-family" type="text" list="font-library"></label>
        <datalist id="font-library">
          <option value="Inter, system-ui, sans-serif"></option>
          <option value="Georgia, serif"></option>
          <option value="'Playfair Display', Georgia, serif"></option>
          <option value="'Cormorant Garamond', Georgia, serif"></option>
          <option value="'DM Sans', Inter, sans-serif"></option>
          <option value="'Space Grotesk', Inter, sans-serif"></option>
          <option value="Montserrat, Inter, sans-serif"></option>
          <option value="'Libre Baskerville', Georgia, serif"></option>
          <option value="'Courier New', monospace"></option>
        </datalist>
        <label>Blend mode
          <select id="prop-blend">
            <option value="">Default</option>
            <option>normal</option>
            <option>screen</option>
            <option>multiply</option>
            <option>overlay</option>
            <option>soft-light</option>
            <option>hard-light</option>
          </select>
        </label>
      </section>

      <section class="property-section decoration-tools">
        <h3>Selected Asset</h3>
        <div class="inline-actions">
          <button id="btn-bring-forward" type="button">Forward</button>
          <button id="btn-send-backward" type="button">Backward</button>
        </div>
      </section>

      <section class="property-section">
        <h3>Background</h3>
        <label>Section fill <input id="prop-section-bg" type="color"></label>
        <label>Section image <input id="prop-section-bg-image" type="text" placeholder="images/example.jpg"></label>
        <label>Page fill <input id="prop-page-bg" type="color"></label>
        <label>Page image <input id="prop-page-bg-image" type="text" placeholder="images/example.jpg"></label>
        <div class="inline-actions">
          <button id="btn-apply-background" type="button">Apply</button>
          <button id="btn-clear-background" type="button">Clear</button>
        </div>
      </section>

      <section class="property-section">
        <h3>Actions</h3>
        <div class="action-grid">
          <button id="btn-hide" type="button">Hide</button>
          <button id="btn-duplicate" type="button">Duplicate</button>
          <button id="btn-reset-selected" type="button">Reset</button>
          <button id="btn-select-parent" type="button">Parent</button>
          <button id="btn-move-layer-up" type="button">Layer Up</button>
          <button id="btn-move-layer-down" type="button">Layer Down</button>
          <button id="btn-delete" type="button" class="danger">Delete</button>
        </div>
      </section>
    </aside>

    <div id="floating-toolbar" aria-label="Selection tools">
      <span id="float-label"></span>
      <button id="float-replace" type="button">Replace</button>
      <button id="float-edit-text" type="button">Edit Text</button>
      <button id="float-duplicate" type="button">Duplicate</button>
      <button id="float-hide" type="button">Hide</button>
      <button id="float-forward" type="button">Forward</button>
      <button id="float-backward" type="button">Backward</button>
      <button id="float-delete" type="button">Delete</button>
    </div>

    <div id="context-menu" aria-label="Editor context menu"></div>
    <div id="add-library" aria-label="Add library"></div>
  </div>

  <script src="/js/local-editor.js"></script>
</body>
</html>
